<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NYC Events -- <!--DATE--></title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 780px;
    margin: 0 auto;
    padding: 24px 16px 80px;
    background: #fafafa;
    color: #1a1a1a;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #16161a; color: #e8e8e8; }
    .card { background: #212126 !important; border-color: #33333a !important; }
    .meta { color: #a0a0aa !important; }
  }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  .sub { color: #777; margin-bottom: 24px; font-size: 0.9rem; }
  .card {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .card h2 { font-size: 1.05rem; margin: 0 0 6px; }
  .card h2 a { color: inherit; text-decoration: none; }
  .card h2 a:hover { text-decoration: underline; }
  .meta { color: #666; font-size: 0.85rem; margin-bottom: 8px; }
  .tag {
    display: inline-block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    background: #eee;
    border-radius: 999px;
    padding: 2px 9px;
    margin-right: 6px;
    color: #555;
  }
  .desc { font-size: 0.92rem; margin: 8px 0 12px; line-height: 1.4; }
  .actions button {
    border: 1px solid #ccc;
    background: none;
    border-radius: 6px;
    padding: 5px 12px;
    margin-right: 8px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .actions button.like.active { background: #d3f5d3; border-color: #7bc47f; }
  .actions button.dislike.active { background: #f5d3d3; border-color: #c47b7b; }
  .empty { color: #777; padding: 40px 0; text-align: center; }
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid #e5e5e5;
  }
  @media (prefers-color-scheme: dark) {
    .tabs { border-color: #33333a; }
    .tab-btn.active { color: #fff !important; border-color: #fff !important; }
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 10px 4px;
    margin-right: 20px;
    font-size: 0.95rem;
    font-weight: 600;
    color: #888;
    cursor: pointer;
  }
  .tab-btn.active { color: #111; border-color: #111; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
</style>
</head>
<body>
<h1>NYC Events</h1>
<div class="sub"><!--DATE--></div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('events', this)">Events (<!--EVENTS_COUNT-->)</button>
  <button class="tab-btn" onclick="showTab('concerts', this)">Concerts (<!--CONCERTS_COUNT-->)</button>
</div>

<div id="events-panel" class="tab-panel active">
<!--EVENTS-->
</div>
<div id="concerts-panel" class="tab-panel">
<!--CONCERTS-->
</div>

<script>
function showTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name + '-panel').classList.add('active');
  btn.classList.add('active');
}

async function react(id, action, btn) {
  const card = btn.closest('.card');
  const likeBtn = card.querySelector('.like');
  const dislikeBtn = card.querySelector('.dislike');
  likeBtn.classList.remove('active');
  dislikeBtn.classList.remove('active');
  btn.classList.add('active');
  try {
    await fetch('/feedback', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id, action, title: card.dataset.title, category: card.dataset.category})
    });
  } catch (e) {
    console.error('feedback failed', e);
  }
}
</script>
</body>
</html>
